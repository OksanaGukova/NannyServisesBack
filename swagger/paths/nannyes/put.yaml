put:
  tags:
    - Nannyes
  summary: Upsert nanny
  description: Updates an existing nanny or creates a new one if not found
  security:
    - bearerAuth: []

  parameters:
    - in: path
      name: nannyId
      required: true
      schema:
        type: string
      description: Nanny ID

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/nannyCreate.yaml'

  responses:
    '200':
      description: Successfully updated nanny
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully upserted a nanny!
              data:
                $ref: '../../components/schemas/nanny.yaml'

    '201':
      description: Successfully created nanny
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 201
              message:
                type: string
                example: Successfully upserted a nanny!
              data:
                $ref: '../../components/schemas/nanny.yaml'

    '401':
      $ref: '../../components/responses/401.yaml'
    '500':
      $ref: '../../components/responses/500.yaml'
