tags:
  - Users
summary: Request a password reset token
operationId: requestResetEmail
description: Request a password reset token to be sent to the user's email.
  Note - respond neutrally to avoid disclosing whether the email exists in the system.
security:
- bearerAuth: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '../../components/schemas/sessions.yaml'
      examples:
        example:
          value:
            email: "johndoe@example.com"
responses:
  '200':
    description: 'Reset password email has been successfully sent.'
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/sessions.yaml'
        examples:
          success:
            value:
              status: 200
              message: "If an account with that email exists, a reset link has been sent."
              data: {}
  '400':
    $ref: '../../components/responses/400.yaml'
  '422':
    $ref: '../../components/responses/422.yaml'
  '429':
    $ref: '../../components/responses/429.yaml'
  '500':
    $ref: '../../components/responses/500.yaml'
